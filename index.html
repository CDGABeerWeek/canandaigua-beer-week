<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canandaigua Beer Week | Thanks for an Awesome Week</title>
    <meta
      name="description"
      content="Thanks for an awesome Canandaigua Beer Week. Stay tuned for 2027 dates, to be announced soon."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero-art" aria-label="Canandaigua Beer Week artwork">
        <picture>
          <source
            media="(max-width: 720px)"
            srcset="./assets/beer-week-hero-mobile.png"
          />
          <img
            src="./assets/beer-week-hero-desktop.png"
            alt="Canandaigua Beer Week promotional artwork."
          />
        </picture>
      </section>

      <section class="thanks-card" aria-labelledby="page-title">
        <p class="eyebrow">Canandaigua Beer Week</p>
        <h1 id="page-title">Thanks for an awesome week!</h1>
        <p class="lede">Stay tuned for 2027 dates TBA soon!</p>
      </section>
    </main>
  </body>
</html>
